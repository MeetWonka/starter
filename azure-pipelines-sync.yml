trigger:
  branches:
    include:
      - dev

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: github-sync-secrets

steps:
- checkout: self
  fetchDepth: 0
  clean: true

- script: |
    git config --global user.email "azure-pipeline@wonka.dev"
    git config --global user.name "Azure Pipeline"
  displayName: 'Configure Git'

- script: |
    echo "Syncing all branches to GitHub (except deleting main)..."
    git remote add github https://$(Github_pat)@github.com/MeetWonka/starter.git
    
    # Push all branches
    git push github --all --force
    
    # Push all tags
    git push github --tags --force
  displayName: 'Sync to GitHub'
  env:
    GITHUB_PAT: $(Github_pat)
