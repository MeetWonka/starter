trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: github-sync-secrets

steps:
- checkout: self
  fetchDepth: 0
  clean: true

- script: |
    git config --global user.email "azure-pipeline@wonka.dev"
    git config --global user.name "Azure Pipeline"
    
    # Checkout main branch
    git checkout main
    
    echo "Current branch:"
    git branch
  displayName: 'Configure Git and checkout main'

- script: |
    echo "Syncing main branch to GitHub..."
    git remote add github https://$(Github_pat)@github.com/MeetWonka/starter.git
    
    # Push only main branch
    git push github main:main --force
  displayName: 'Sync main to GitHub'
  env:
    GITHUB_PAT: $(Github_pat)
