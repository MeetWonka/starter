trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: github-sync-secrets

steps:
- checkout: self
  fetchDepth: 0
  clean: true

- script: |
    git config --global user.email "azure-pipeline@wonka.dev"
    git config --global user.name "Azure Pipeline"
  displayName: 'Configure Git'

- script: |
    echo "Mirroring to GitHub dev branch..."
    git remote add github https://$(Github_pat)@github.com/MeetWonka/starter.git
    git push github refs/heads/main:refs/heads/dev --force
  displayName: 'Mirror to GitHub dev branch'
  env:
    GITHUB_PAT: $(Github_pat)
