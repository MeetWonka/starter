trigger:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: github-sync-secrets

steps:
- checkout: self
  fetchDepth: 0
  clean: true

- script: |
    git config --global user.email "azure-pipeline@wonka.dev"
    git config --global user.name "Azure Pipeline"
    
    # Fetch all remote branches
    git fetch origin
    
    # Create local tracking branches for all remote branches
    for branch in $(git branch -r | grep -v '\->' | sed 's/origin\///'); do
      git branch --track "$branch" "origin/$branch" 2>/dev/null || true
    done
    
    echo "Listing all branches:"
    git branch -a
  displayName: 'Configure Git and fetch all branches'

- script: |
    echo "Syncing all branches to GitHub (except deleting main)..."
    git remote add github https://$(Github_pat)@github.com/MeetWonka/starter.git
    
    # Push all branches
    git push github --all --force
    
    # Push all tags
    git push github --tags --force
  displayName: 'Sync to GitHub'
  env:
    GITHUB_PAT: $(Github_pat)
